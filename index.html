<!DOCTYPE html>
<html lang="id">
<head>
  <title>Koperasi NF</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a5276">
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dp8rda8g4/image/upload/v1782645149/MTs%20Nurul%20Falah/Logo_Koperasi_kgrf9b.png">
  <link rel="icon" href="https://res.cloudinary.com/dp8rda8g4/image/upload/v1782645149/MTs%20Nurul%20Falah/Logo_Koperasi_kgrf9b.png">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: sans-serif;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column; /* Mengubah struktur agar iframe dan footer tidak saling menimpa */
    }
    iframe {
      flex: 1; /* Iframe akan otomatis mengisi seluruh sisa ruang layar */
      width: 100%;
      border: none;
    }
    /* Konfigurasi UI Pengaman Antarmuka */
    #randi-pratama-secure-footer {
      background-color: #1a5276;
      color: #ffffff;
      text-align: center;
      padding: 8px;
      font-size: 11px;
      font-weight: 500;
      z-index: 999;
    }
  </style>
</head>
<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbyjAK8rAZPrUANiMDbp_tGgd0G5HR1i1VkjjqxkWZeMaP3zBb0ovezO1hEzLSotf46A/exec"
    allowfullscreen="true"
    allow="fullscreen"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-fullscreen allow-popups-to-escape-sandbox allow-top-navigation"
    loading="lazy">
    <p>Browser Anda tidak mendukung iframe.</p>
  </iframe>

  <div id="randi-pratama-secure-footer">
    &copy; Copyright Randi Pratama, S.Pd. | Hak Cipta Dilindungi Undang-Undang - CBT Version 4.5
  </div>

  <script>
    window.addEventListener("message", function(event) {
      // Pastikan pesan membawa data scrollY
      if (event.data && typeof event.data.scrollY !== 'undefined') {
        
        var status = (event.data.scrollY === 0) ? "SCROLL_TOP" : "SCROLL_DOWN";
        
        // Mengirim status ke CustomWebView Kodular menggunakan WebViewString
        if (window.AppInventor) {
          window.AppInventor.setWebViewString(status);
        }
      }
    });

    // Pendaftaran Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => console.log('SW terdaftar:', registration.scope))
          .catch(error => console.error('SW gagal:', error));
      });
    }
  </script>
</body>
</html>
